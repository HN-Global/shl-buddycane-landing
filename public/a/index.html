    <!-- 인라인 CSS로 렌더링 차단 방지 -->

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; line-height: 1.5; color: #111; background-color: #f5f5f5; }
        img { max-width: 100%; height: auto; display: block; }

        /* Mobile Container */

        /* Header */
        .main-header { height: 60px; border-bottom: none; background: transparent; position: relative; z-index: 50; }
        .header-inner { display: flex; justify-content: center; align-items: center; height: 100%; padding: 0 20px; position: relative; }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: -1px; color: #192a48; }
        .user-icon { position: absolute; right: 20px; }

        /* Image classes */
        .full-img { width: 100%; display: block; margin: 0; }

        /* PC Responsive Media Query */
        @media (min-width: 1024px) {
            #mobile-app {
                max-width: 800px;
                margin: 0 auto;
                box-shadow: 0 0 40px rgba(0,0,0,0.08);
                padding-bottom: 120px;
            }

            /* Header */

            .logo { font-size: 28px; }
            .user-icon svg { width: 32px; height: 32px; }

            /* Images */
            .full-img { width: 100%; max-width: 100%; }
            
            /* Video Highlights */
            .youtube-iframe { width: 100%; max-width: 100%; display: block !important; }

            /* Floating Button */
            .floating-buy { max-width: 800px !important; padding: 20px 40px !important; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 30px rgba(0,0,0,0.08); }
            .floating-buy span:first-child { font-size: 16px !important; }
            .floating-buy span:last-child { font-size: 32px !important; }
            .floating-buy button, .floating-buy a { font-size: 22px !important; max-width: 250px !important; padding: 18px 40px !important; display: flex; align-items: center; justify-content: center; }
        }

        /* Utilities */
        .text-center { text-align: center; }
        .youtube-iframe { width: 100%; aspect-ratio: 16/9; border: none; margin: 0; display: block; }

        /* Image Reset to prevent gaps */
        main.ab-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin: 0;
            padding: 0;
        }
        main.ab-content img, main.ab-content iframe {
            width: 100%;
            max-width: 100%;
            display: block;
            margin: 0;
            padding: 0;
            border: none;
            vertical-align: top;
        }
    </style>
    <meta name="referrer" content="strict-origin-when-cross-origin">

            <img src="/a/images/16._detail7_.webp" alt="16" class="full-img" loading="lazy" decoding="async" width="860" height="1478">

        <!-- Floating Buy Button Area -->

    <!-- JS는 렌더링을 막지 않도록 defer 속성 사용 -->
    <script src="/a/script.js" defer></script>

    <!-- Hero 영상 소리 켜기 -->
    <script>
      function shlUnmute() {
        var v = document.getElementById('heroVideo');
        var b = document.getElementById('heroUnmute');
        if (!v) return;
        v.muted = false; v.volume = 1;
        var p = v.play(); if (p && p.catch) p.catch(function () {});
        if (b) b.style.display = 'none';
      }
      (function () {
        var v = document.getElementById('heroVideo');
        var b = document.getElementById('heroUnmute');
        if (v && b) v.addEventListener('volumechange', function () { if (!v.muted) b.style.display = 'none'; });
      })();
    </script>

    <!-- 배경 영상 lazy 로더: 화면 근처(200px)에 들어올 때만 src 주입 후 자동재생 -->
    <script>
      (function () {
        var vids = document.querySelectorAll('video[data-bg]');
        function load(v) {
          if (v.dataset.loaded) return;
          v.dataset.loaded = '1';
          var s = v.querySelector('source[data-src]');
          if (s) { s.src = s.getAttribute('data-src'); v.load(); }
          var p = v.play(); if (p && p.catch) p.catch(function () {});
        }
        if (!('IntersectionObserver' in window)) {
          for (var i = 0; i < vids.length; i++) load(vids[i]);
          return;
        }
        var io = new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            if (e.isIntersecting) { load(e.target); io.unobserve(e.target); }
          });
        }, { rootMargin: '200px' });
        vids.forEach(function (v) { io.observe(v); });
      })();
    </script>

</body>
