    <!-- cane-fix 영상 클릭(수동) 재생 -->
    <script>
      function shlPlayCane(el) {
        var v = el.querySelector('video');
        if (!v || v.dataset.started) return;
        v.dataset.started = '1';
        var s = v.querySelector('source[data-src]');
        if (s) { s.src = s.getAttribute('data-src'); v.load(); }
        for (var i = 0; i < el.children.length; i++) {
          if (el.children[i] !== v) el.children[i].style.display = 'none';
        }
        v.style.display = 'block';
        var p = v.play(); if (p && p.catch) p.catch(function () {});
      }
      document.addEventListener('keydown', function (e) {
        if ((e.key === 'Enter' || e.key === ' ') && e.target.classList && e.target.classList.contains('cane-video')) {
          e.preventDefault();
          shlPlayCane(e.target);
        }
      });
    </script>

    <!-- 배경 영상 lazy 로더: 화면 근처(200px)에 들어올 때만 src 주입 후 자동재생 -->
    <script>
      (function () {
        var vids = document.querySelectorAll('video[data-bg]');
        function load(v) {
          if (v.dataset.loaded) return;
          v.dataset.loaded = '1';
          var s = v.querySelector('source[data-src]');
          if (s) { s.src = s.getAttribute('data-src'); v.load(); }
          var p = v.play(); if (p && p.catch) p.catch(function () {});
        }
        if (!('IntersectionObserver' in window)) {
          for (var i = 0; i < vids.length; i++) load(vids[i]);
          return;
        }
        var io = new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            if (e.isIntersecting) { load(e.target); io.unobserve(e.target); }
          });
        }, { rootMargin: '200px' });
        vids.forEach(function (v) { io.observe(v); });
      })();
    </script>
