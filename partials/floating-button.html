<!--
  ===========================================================
  공통 플로팅 구매 버튼 (A/B 공통)
  디자이너 수정 가능 영역: 디자인/문구/위치 자유.
  단, 아래 두 가지는 반드시 유지하세요 (주문 로직 연결됨):
    1) 버튼 id="shlBuyBtn"
    2) onclick="shlBuy()"
  이 둘만 유지하면 스타일/문구는 마음껏 바꿔도 됩니다.
  ===========================================================
-->
<style>
  #shlFloatingBar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; background: #fff; border-top: 1px solid #eee;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
  }
  #shlFloatingBar .shl-info .shl-name { font-size: 14px; color: #666; }
  #shlFloatingBar .shl-info .shl-price { font-size: 20px; font-weight: 800; }
  #shlBuyBtn {
    background: #1a1a2e; color: #fff; border: none;
    padding: 16px 32px; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer;
  }
  #shlBuyBtn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>

<div id="shlFloatingBar">
  <div class="shl-info">
    <div class="shl-name">SHL 버디케인</div>
    <div class="shl-price">129,000원</div>
  </div>
  <button id="shlBuyBtn" onclick="shlBuy()">주문하기</button>
</div>
