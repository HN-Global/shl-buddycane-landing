<!--
  ===========================================================
  공통 플로팅 구매 버튼 (A/B 공통)
  ===========================================================
-->
<style>
  #shlFloatingBar {
    position: fixed; 
    bottom: 0; 
    left: 50%; 
    transform: translateX(-50%); 
    width: 100%; 
    max-width: 480px; 
    background: #fff; 
    padding: 15px 20px; 
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06); 
    display: flex; 
    align-items: center; 
    justify-content: space-between;
    z-index: 1000; 
    box-sizing: border-box; 
    border-top: 1px solid #f0f0f0;
    transition: all 0.3s ease;
  }
  
  #shlFloatingBar .shl-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  
  #shlFloatingBar .shl-info .shl-name { 
    font-size: 13px; 
    color: #88939e; 
    font-weight: 700; 
    line-height: 1.2; 
    letter-spacing: -0.5px; 
    margin-bottom: 2px;
  }
  
  #shlFloatingBar .shl-info .shl-price { 
    font-size: 22px; 
    color: #0d1b2a; 
    font-weight: 800; 
    letter-spacing: -0.5px; 
    line-height: 1;
  }

  #shlBuyBtn {
    background: linear-gradient(to right, #8ed1d4, #61b1be);
    color: #fff; 
    border: none;
    padding: 14px 40px; 
    border-radius: 30px;
    font-size: 16px; 
    font-weight: 800; 
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(142, 209, 212, 0.3);
    transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    max-width: 180px;
    font-family: inherit;
  }

  #shlBuyBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(142, 209, 212, 0.4);
    background: linear-gradient(to right, #7ec1c4, #51a1ae);
  }

  #shlBuyBtn:active {
    transform: translateY(1px);
    box-shadow: 0 2px 10px rgba(142, 209, 212, 0.2);
  }
</style>

<div id="shlFloatingBar">
  <div class="shl-info">
    <div class="shl-name">SHL 버디케인</div>
    <div class="shl-price">129,000원</div>
  </div>
  <button id="shlBuyBtn" onclick="shlBuy()">구매하기</button>
</div>
